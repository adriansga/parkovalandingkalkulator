<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Uroczystości | Rezydencja Parkova</title>
<meta name="description" content="Oblicz koszt uroczystości w Rezydencji Parkova — wesele, urodziny, komunia, imieniny. Wybierz dania i sprawdź cenę online.">
<link rel="canonical" href="https://rezydencjaparkova.pl/kalkulator-eventy.html">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── VARIABLES ─── */
:root{
  --green:       #2E5E2A;
  --green-dark:  #1E3D1A;
  --green-light: #3d7a35;
  --green-glow:  rgba(46,94,42,.45);
  --gold:        #C8A028;
  --gold-light:  #e0b830;
  --dark:        #080B07;
  --dark2:       #0d140c;
  --dark3:       #121c10;
  --text:        #f0f0ea;
  --text-muted:  #8fa88d;
  --border:      rgba(46,94,42,.22);
  --r-sm:  8px;
  --r-md: 14px;
  --r-lg: 22px;
  --ease: .25s ease;
}

/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;padding-bottom:11rem;line-height:1.6}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.2}

/* ─── HEADER ─── */
header{background:rgba(8,11,7,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;padding:1rem 1.5rem;backdrop-filter:blur(14px)}
.header-inner{max-width:896px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-sub{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-muted);font-weight:700;line-height:1}
.logo-name{font-size:15px;font-family:'Playfair Display',serif;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);line-height:1.2}
.header-right{display:flex;align-items:center;gap:16px}
.back-link{font-size:10px;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:var(--ease);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.back-link:hover{color:var(--gold)}
.admin-btn{padding:8px 12px;border-radius:var(--r-md);border:1px solid var(--border);cursor:pointer;font-size:14px;line-height:1;transition:var(--ease);background:transparent;color:var(--text-muted);font-family:inherit;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.1em}
.admin-btn.inactive{background:transparent;color:var(--text-muted)}
.admin-btn.active{background:rgba(200,160,40,.12);color:var(--gold);border-color:rgba(200,160,40,.4)}

/* ─── MAIN ─── */
main{max-width:896px;margin:0 auto;padding:2rem 1.5rem}

/* ─── PAGE TITLE ─── */
.page-hero{margin-bottom:2rem}
.page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.2rem);color:var(--text);margin-bottom:.4rem}
.page-hero h1 span{color:var(--gold)}
.page-hero p{font-size:.85rem;color:var(--text-muted);font-weight:400}

/* ─── CARDS ─── */
.card{background:var(--dark2);border-radius:var(--r-lg);border:1px solid var(--border);padding:2rem;margin-bottom:24px}
.card-title{display:flex;align-items:center;gap:8px;font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);margin-bottom:1rem}

/* ─── DATE / GUEST GRID ─── */
.date-guest-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px}
.date-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
input[type=date],input[type=number]{background:var(--dark3);border-radius:var(--r-md);padding:.85rem;font-size:13px;border:1px solid var(--border);outline:none;width:100%;font-family:inherit;color:var(--text);color-scheme:dark}
input[type=date]:focus,input[type=number]:focus{border-color:var(--green)}
.guest-input{font-size:40px;font-weight:700;text-align:center;border-radius:var(--r-md);padding:1.25rem;color:var(--gold) !important}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;padding:.4rem .9rem;border-radius:999px;letter-spacing:.05em}
.badge-green{background:rgba(46,94,42,.25);color:#6bcf5f;border:1px solid rgba(46,94,42,.4)}
.badge-amber{background:rgba(200,160,40,.12);color:var(--gold);border:1px solid rgba(200,160,40,.3)}
.badge-blue{background:rgba(46,94,42,.15);color:var(--text-muted);border:1px solid var(--border)}
.guest-section{border-left:1px solid var(--border);padding-left:24px}

/* ─── CATEGORIES ─── */
.cat-tabs{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.cat-tab{padding:.7rem 1.4rem;border-radius:50px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:var(--ease);font-family:inherit}
.cat-tab:hover{color:var(--text);border-color:rgba(46,94,42,.5)}
.cat-tab.active{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 6px 20px var(--green-glow)}
.menu-wrap{border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
.menu-header{padding:1.25rem 1.75rem;background:var(--dark3);border-bottom:1px solid var(--border);font-family:'Playfair Display',serif;font-size:20px;color:var(--text)}
.menu-item{padding:1.25rem 1.75rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border);background:var(--dark2);transition:background var(--ease)}
.menu-item:last-child{border-bottom:none}
.menu-item.selected{background:rgba(46,94,42,.15)}
.menu-item:hover{background:var(--dark3)}
.item-left{display:flex;align-items:center;gap:16px}
.item-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.item-check.checked{background:var(--green);border-color:var(--green);transform:scale(1.1)}
.item-check .dot{width:8px;height:8px;background:#fff;border-radius:50%}
.item-name{font-size:15px;color:var(--text-muted)}
.item-name.selected{font-weight:600;color:var(--text)}
.item-price{font-family:'Playfair Display',serif;font-weight:700;font-size:17px;color:var(--text);text-align:right}
.item-discount{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.05em;text-align:right}

/* ─── CONTACT FORM ─── */
.contact-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.contact-input{background:var(--dark3);border-radius:var(--r-md);padding:1rem;font-size:14px;border:1px solid var(--border);outline:none;width:100%;font-family:inherit;color:var(--text);transition:var(--ease)}
.contact-input::placeholder{color:var(--text-muted)}
.contact-input:focus{border-color:var(--green)}

/* ─── LEGAL NOTE ─── */
.legal{background:var(--dark3);border:1px solid var(--border);padding:1.5rem 2rem;border-radius:var(--r-lg);font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.7;margin-bottom:24px}
.legal-inner{display:flex;gap:12px;align-items:flex-start}

/* ─── ADMIN PANEL ─── */
.admin-login{max-width:380px;margin:5rem auto;background:var(--dark2);padding:3rem;border-radius:var(--r-lg);border:1px solid var(--border);text-align:center}
.admin-lock{width:64px;height:64px;background:rgba(200,160,40,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;color:var(--gold);border:1px solid rgba(200,160,40,.3);font-size:32px}
.admin-form{display:flex;flex-direction:column;gap:12px}
.admin-pass{background:var(--dark3);border:1px solid var(--border);border-radius:var(--r-md);padding:1rem;text-align:center;font-size:14px;outline:none;width:100%;color:var(--text);font-family:inherit}
.admin-pass:focus{border-color:var(--green)}
.admin-submit{background:var(--green);color:#fff;padding:1rem;border-radius:50px;border:none;font-weight:700;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:var(--ease);box-shadow:0 0 20px var(--green-glow)}
.admin-submit:hover{background:var(--green-light)}
.admin-panel-header{display:flex;justify-content:space-between;align-items:center;background:rgba(46,94,42,.12);padding:1.5rem 2rem;border-radius:var(--r-lg);border:1px solid var(--border);margin-bottom:24px}
.admin-panel-title{display:flex;align-items:center;gap:12px;color:var(--gold);font-family:'Playfair Display',serif;font-size:20px;letter-spacing:.05em}
.admin-close{background:transparent;color:var(--text-muted);padding:.5rem 1.5rem;border-radius:var(--r-md);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--border);cursor:pointer;font-family:inherit;transition:var(--ease)}
.admin-close:hover{color:var(--text);border-color:rgba(46,94,42,.5)}
.admin-section{background:var(--dark2);padding:2rem;border-radius:var(--r-lg);border:1px solid var(--border);margin-bottom:24px}
.admin-section-title{color:var(--gold);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:20px;font-family:'Playfair Display',serif;font-size:16px}
.discount-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px}
.discount-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.discount-row{display:flex;justify-content:space-between;align-items:center;background:var(--dark3);border-radius:var(--r-md);padding:.75rem 1rem;margin-bottom:8px;border:1px solid var(--border)}
.discount-row-label{font-size:12px;font-weight:600;color:var(--text-muted)}
.discount-input{width:72px;text-align:right;font-weight:700;color:var(--green-light);border:none;background:var(--dark);border-radius:var(--r-sm);padding:6px;outline:none;font-size:14px;font-family:inherit}
.dur-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dur-cell{display:flex;flex-direction:column;background:var(--dark3);border-radius:var(--r-md);padding:.75rem;border:1px solid var(--border)}
.dur-cell-label{font-size:9px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.dur-cell-input{text-align:right;font-weight:700;color:var(--gold);border:none;background:var(--dark);border-radius:var(--r-sm);padding:6px;outline:none;font-size:14px;width:100%;font-family:inherit}
.category-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:16px}
.cat-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin:0}
.add-btn{font-size:10px;font-weight:700;color:var(--green-light);background:rgba(46,94,42,.18);padding:.4rem 1rem;border-radius:var(--r-md);border:1px solid rgba(46,94,42,.35);cursor:pointer;font-family:inherit;transition:var(--ease)}
.add-btn:hover{background:rgba(46,94,42,.32)}
.menu-edit-row{display:flex;gap:12px;align-items:center;margin-bottom:8px}
.menu-edit-name{flex:1;background:var(--dark3);border-radius:var(--r-md);padding:.85rem 1rem;font-size:14px;border:1px solid var(--border);outline:none;font-family:inherit;color:var(--text)}
.menu-edit-name:focus{border-color:var(--green)}
.menu-edit-price{width:90px;background:var(--dark3);border-radius:var(--r-md);padding:.85rem;font-weight:700;text-align:right;font-size:14px;border:1px solid var(--border);outline:none;font-family:inherit;color:var(--gold)}
.menu-edit-price:focus{border-color:var(--gold)}
.delete-btn{padding:.6rem;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1;transition:var(--ease)}
.delete-btn:hover{color:#ef4444}

/* ─── STICKY FOOTER ─── */
.sticky-footer{position:fixed;bottom:0;left:0;right:0;background:rgba(8,11,7,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);box-shadow:0 -20px 50px rgba(0,0,0,.4);z-index:40;padding:1.25rem 1.5rem}
.sticky-inner{max-width:896px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.price-group{display:flex;align-items:center;gap:32px}
.price-block p.price-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-bottom:2px}
.price-block p.price-value{font-family:'Playfair Display',serif;font-size:30px;color:var(--gold);line-height:1}
.price-block p.price-total{font-family:'Playfair Display',serif;font-size:30px;color:var(--text);line-height:1}
.price-block p.price-savings{font-family:'Playfair Display',serif;font-size:20px;color:#6bcf5f;line-height:1}
.price-divider{width:1px;height:48px;background:var(--border)}
.footer-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.footer-summary{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.send-btn{background:var(--green);color:#fff;padding:.9rem 2.5rem;border-radius:50px;border:none;font-weight:700;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 20px var(--green-glow);font-family:inherit;transition:var(--ease)}
.send-btn:hover{background:var(--green-light);transform:translateY(-1px);box-shadow:0 6px 28px var(--green-glow)}

@media(max-width:640px){
  .date-guest-grid{grid-template-columns:1fr}
  .guest-section{border-left:none;padding-left:0;border-top:1px solid var(--border);padding-top:16px}
  .contact-grid{grid-template-columns:1fr}
  .discount-grid{grid-template-columns:1fr}
  .price-group{gap:16px}
  .price-block p.price-value,.price-block p.price-total{font-size:22px}
}
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <div class="header-inner">
    <a href="index.html" class="logo-wrap">
      <div>
        <p class="logo-sub">Rezydencja</p>
        <div class="logo-name">Parkova</div>
      </div>
    </a>
    <div class="header-right">
      <a href="index.html" class="back-link">← Strona główna</a>
      <button class="admin-btn inactive" id="adminBtn" onclick="toggleAdminMode()" title="Panel administratora">⚙ Admin</button>
    </div>
  </div>
</header>

<!-- ─── MAIN ─── -->
<main id="appMain">
  <!-- renderowane przez JS -->
</main>

<!-- ─── STICKY FOOTER ─── -->
<div class="sticky-footer" id="stickyFooter" style="display:none">
  <div class="sticky-inner">
    <div class="price-group" id="priceGroup"></div>
    <div class="footer-right">
      <p class="footer-summary" id="footerSummary"></p>
      <button class="send-btn" onclick="submitInquiry()">Wyślij zapytanie →</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───
const ADMIN_PASSWORD = "Parkova2024";

const DEFAULT_MENU = {
  zupy: [
    { id: 1, name: "Rosół królewski z makaronem domowym", price: 18 },
    { id: 2, name: "Krem z białych warzyw z oliwą truflową", price: 22 },
  ],
  dania_cieple: [
    { id: 3, name: "Pierś z kaczki w sosie wiśniowym", price: 55 },
    { id: 4, name: "Polędwiczki wieprzowe w sosie kurkowym", price: 48 },
  ],
  przystawki: [
    { id: 6, name: "Półmisek wędlin staropolskich", price: 35 },
    { id: 7, name: "Tatar wołowy z dodatkami", price: 42 },
  ],
  bufet_slodki: [
    { id: 9, name: "Wybór ciast domowych", price: 25 },
    { id: 10, name: "Mini desery bankietowe", price: 30 },
  ],
};

const DEFAULT_DISCOUNTS = {
  guests: { tier1: 0.5, tier2: 1.0, tier3: 1.5 },
  duration: { d2: 0.1, d3: 0.2, d4: 0.3, d5: 0.5, d6: 0.6, d7: 0.7, dMax: 1.0 },
};

const CATEGORY_NAMES = {
  zupy: "Zupy",
  dania_cieple: "Dania Ciepłe",
  przystawki: "Przystawki",
  bufet_slodki: "Bufet Słodki",
};

const today = new Date().toISOString().split("T")[0];

let state = {
  isAdminMode: false,
  isUnlocked: false,
  passInput: "",
  menu: JSON.parse(JSON.stringify(DEFAULT_MENU)),
  discounts: JSON.parse(JSON.stringify(DEFAULT_DISCOUNTS)),
  selectedItems: [],
  guestCount: 20,
  activeCategory: "zupy",
  formData: { fullName: "", email: "", phone: "", startDate: today, endDate: today },
};

// ─── COMPUTED ───
function getDuration() {
  const start = new Date(state.formData.startDate);
  const end   = new Date(state.formData.endDate);
  const diff  = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
  return diff > 0 ? Math.min(diff, 365) : 1;
}
function getGuestDisc() {
  const g = state.guestCount;
  const t = state.discounts.guests;
  return g > 100 ? t.tier3 : g > 50 ? t.tier2 : g > 25 ? t.tier1 : 0;
}
function getDurDisc() {
  const d = getDuration();
  const t = state.discounts.duration;
  if (d > 7) return t.dMax;
  if (d >= 2) return t[`d${d}`] || 0;
  return 0;
}
function getTotalDiscPerItem() { return getGuestDisc() + getDurDisc(); }
function getBasePPPD() { return state.selectedItems.reduce((s, i) => s + (Number(i.price) || 0), 0); }
function getFinalPPPD() { return Math.max(0, getBasePPPD() - state.selectedItems.length * getTotalDiscPerItem()); }
function getTotalPrice() { return getFinalPPPD() * (Number(state.guestCount) || 0) * getDuration(); }
function getTotalSavings() { return state.selectedItems.length * getTotalDiscPerItem() * (Number(state.guestCount) || 0) * getDuration(); }

// ─── RENDER ───
function render() {
  const main = document.getElementById('appMain');
  const footer = document.getElementById('stickyFooter');
  const adminBtn = document.getElementById('adminBtn');

  adminBtn.className = 'admin-btn ' + (state.isAdminMode ? 'active' : 'inactive');

  if (state.isAdminMode && !state.isUnlocked) {
    footer.style.display = 'none';
    main.innerHTML = renderAdminLogin();
    return;
  }
  if (state.isAdminMode && state.isUnlocked) {
    footer.style.display = 'none';
    main.innerHTML = renderAdminPanel();
    return;
  }

  // KALKULATOR
  footer.style.display = 'block';
  main.innerHTML = renderCalculator();
  renderStickyFooter();
}

function renderCalculator() {
  const dur = getDuration();
  const guestDisc = getGuestDisc();
  const durDisc = getDurDisc();
  const totalDisc = getTotalDiscPerItem();

  let html = `
  <!-- Hero -->
  <div class="page-hero">
    <h1>Kalkulator <span>Uroczystości</span></h1>
    <p>Skomponuj menu i sprawdź cenę online — wesele, urodziny, komunia, jubileusz</p>
  </div>

  <!-- Daty i goście -->
  <div class="card">
    <div class="date-guest-grid">
      <div>
        <div class="card-title">📅 Termin uroczystości</div>
        <div class="date-grid">
          <input type="date" value="${state.formData.startDate}" min="${today}" onchange="setStartDate(this.value)">
          <input type="date" value="${state.formData.endDate}" min="${state.formData.startDate}" onchange="setEndDate(this.value)">
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
          <span class="badge badge-green">🕐 ${dur} ${dur === 1 ? 'dzień' : 'dni'}</span>
          ${durDisc > 0 ? `<span class="badge badge-amber">📉 Rabat pobytowy: -${durDisc.toFixed(2)} zł</span>` : ''}
        </div>
      </div>
      <div class="guest-section">
        <div class="card-title">👥 Liczba gości</div>
        <input type="number" class="guest-input" value="${state.guestCount}" min="1" oninput="setGuestCount(this.value)">
        ${guestDisc > 0 ? `<div style="margin-top:8px"><span class="badge badge-blue">🏷️ Rabat grupowy: -${guestDisc.toFixed(2)} zł/os</span></div>` : ''}
      </div>
    </div>
  </div>

  <!-- Kategorie i menu -->
  <div style="margin-bottom:24px">
    <div class="cat-tabs">
      ${Object.keys(CATEGORY_NAMES).map(key => `
        <button class="cat-tab ${state.activeCategory === key ? 'active' : ''}" onclick="setCategory('${key}')">
          ${CATEGORY_NAMES[key]}
        </button>
      `).join('')}
    </div>
    <div class="menu-wrap">
      <div class="menu-header">${CATEGORY_NAMES[state.activeCategory]}</div>
      ${(state.menu[state.activeCategory] || []).map(item => {
        const isSel = !!state.selectedItems.find(i => i.id === item.id);
        return `
        <div class="menu-item ${isSel ? 'selected' : ''}" onclick="toggleItem(${item.id}, '${state.activeCategory}')">
          <div class="item-left">
            <div class="item-check ${isSel ? 'checked' : ''}">${isSel ? '<div class="dot"></div>' : ''}</div>
            <span class="item-name ${isSel ? 'selected' : ''}">${escHtml(item.name)}</span>
          </div>
          <div>
            <div class="item-price">${Number(item.price).toFixed(0)} zł</div>
            ${isSel && totalDisc > 0 ? `<div class="item-discount">Rabat: -${totalDisc.toFixed(2)} zł</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- Formularz kontaktowy -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-title">✉️ Dane kontaktowe</div>
    <div class="contact-grid">
      <input class="contact-input" type="text" placeholder="Imię i Nazwisko" value="${escHtml(state.formData.fullName)}" oninput="setField('fullName', this.value)">
      <input class="contact-input" type="email" placeholder="E-mail" value="${escHtml(state.formData.email)}" oninput="setField('email', this.value)">
      <input class="contact-input" type="tel" placeholder="Telefon" value="${escHtml(state.formData.phone)}" oninput="setField('phone', this.value)">
    </div>
  </div>

  <!-- Nota prawna -->
  <div class="legal">
    <div class="legal-inner">
      <span style="flex-shrink:0;margin-top:2px">ℹ️</span>
      <div>
        <p style="margin:0 0 4px">Ceny <strong>brutto</strong>. Łączny rabat (${totalDisc.toFixed(2)} zł/os/danie) wynika ze skumulowania zniżki grupowej i pobytowej.</p>
        <p style="margin:0">Kalkulacja nie stanowi oferty (art. 66 § 1 KC), lecz zaproszenie do rokowań (art. 71 KC). Rezerwacja wymaga pisemnego potwierdzenia przez Management Rezydencji Parkowej.</p>
      </div>
    </div>
  </div>`;

  return html;
}

function renderStickyFooter() {
  const dur = getDuration();
  const finalPPPD = getFinalPPPD();
  const totalPrice = getTotalPrice();
  const totalSavings = getTotalSavings();

  let priceHtml = `
    <div class="price-block">
      <p class="price-label">Cena / os. / doba</p>
      <p class="price-value">${finalPPPD.toFixed(2)} <span style="font-size:14px;font-family:'Montserrat',sans-serif">zł</span></p>
    </div>
    <div class="price-divider"></div>
    <div class="price-block">
      <p class="price-label">Suma brutto (${dur} ${dur === 1 ? 'dzień' : 'dni'})</p>
      <p class="price-total">${totalPrice.toLocaleString('pl-PL')} <span style="font-size:14px;font-family:'Montserrat',sans-serif">zł</span></p>
    </div>`;
  if (totalSavings > 0) {
    priceHtml += `
    <div class="price-divider"></div>
    <div class="price-block">
      <p class="price-label">Oszczędzasz</p>
      <p class="price-savings">-${totalSavings.toLocaleString('pl-PL')} zł</p>
    </div>`;
  }
  document.getElementById('priceGroup').innerHTML = priceHtml;
  document.getElementById('footerSummary').textContent =
    `${state.selectedItems.length} dań · ${state.guestCount} gości · ${dur} ${dur === 1 ? 'dzień' : 'dni'}`;
}

function renderAdminLogin() {
  return `
  <div class="admin-login">
    <div class="admin-lock">🔒</div>
    <h2 style="font-family:'Playfair Display',serif;font-size:20px;margin-bottom:.5rem;color:var(--text)">Panel Zarządzania</h2>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:1.5rem">Dostęp tylko dla administratorów</p>
    <div class="admin-form">
      <input type="password" class="admin-pass" placeholder="Hasło" id="passField"
        value="${escHtml(state.passInput)}" oninput="state.passInput=this.value"
        onkeydown="if(event.key==='Enter')adminLogin()">
      <button class="admin-submit" onclick="adminLogin()">Zaloguj</button>
    </div>
  </div>`;
}

function renderAdminPanel() {
  let html = `
  <div class="admin-panel-header">
    <div class="admin-panel-title">🔓 Edycja Systemu</div>
    <button class="admin-close" onclick="closeAdmin()">Zamknij panel</button>
  </div>

  <!-- Rabaty -->
  <div class="admin-section">
    <div class="admin-section-title">💰 Konfiguracja Rabatów (zł/os/danie)</div>
    <div class="discount-grid">
      <div>
        <p class="discount-label">Rabaty za ilość osób</p>
        ${[{label:'Powyżej 25 gości',key:'tier1'},{label:'Powyżej 50 gości',key:'tier2'},{label:'Powyżej 100 gości',key:'tier3'}].map(({label,key}) => `
        <div class="discount-row">
          <span class="discount-row-label">${label}:</span>
          <input type="number" step="0.1" class="discount-input" value="${state.discounts.guests[key]}"
            onchange="setGuestDisc('${key}', this.value)">
        </div>`).join('')}
      </div>
      <div>
        <p class="discount-label">Rabaty za dni pobytu</p>
        <div class="dur-grid">
          ${[2,3,4,5,6,7].map(d => `
          <div class="dur-cell">
            <span class="dur-cell-label">${d} dni:</span>
            <input type="number" step="0.1" class="dur-cell-input" value="${state.discounts.duration['d'+d]}"
              onchange="setDurDisc('d${d}', this.value)">
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;

  // Menu kategorii
  Object.keys(CATEGORY_NAMES).forEach(key => {
    html += `
  <div class="admin-section">
    <div class="category-header">
      <h4 class="cat-label">${CATEGORY_NAMES[key]}</h4>
      <button class="add-btn" onclick="addMenuItem('${key}')">+ Dodaj danie</button>
    </div>
    <div>
      ${(state.menu[key] || []).map((item, idx) => `
      <div class="menu-edit-row">
        <input class="menu-edit-name" value="${escHtml(item.name)}" onchange="updateMenuName('${key}',${idx},this.value)">
        <input type="number" class="menu-edit-price" value="${item.price}" onchange="updateMenuPrice('${key}',${idx},this.value)">
        <button class="delete-btn" onclick="deleteMenuItem('${key}',${idx})">🗑️</button>
      </div>`).join('')}
    </div>
  </div>`;
  });

  return html;
}

// ─── HELPERS ───
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── ACTIONS ───
function toggleAdminMode() {
  if (state.isAdminMode) {
    state.isAdminMode = false;
    state.isUnlocked = false;
    state.passInput = "";
  } else {
    state.isAdminMode = true;
  }
  render();
}

function adminLogin() {
  if (state.passInput === ADMIN_PASSWORD) {
    state.isUnlocked = true;
    render();
  } else {
    alert("Błędne hasło administratora.");
  }
}

function closeAdmin() {
  state.isAdminMode = false;
  state.isUnlocked = false;
  render();
}

function setCategory(key) {
  state.activeCategory = key;
  render();
}

function toggleItem(id, category) {
  const item = state.menu[category].find(i => i.id === id);
  if (!item) return;
  const idx = state.selectedItems.findIndex(i => i.id === id);
  if (idx >= 0) {
    state.selectedItems.splice(idx, 1);
  } else {
    state.selectedItems.push({...item});
  }
  render();
}

function setStartDate(val) {
  state.formData.startDate = val;
  if (val > state.formData.endDate) state.formData.endDate = val;
  render();
}

function setEndDate(val) {
  state.formData.endDate = val;
  render();
}

function setGuestCount(val) {
  state.guestCount = Math.max(1, parseInt(val) || 1);
  render();
}

function setField(key, val) {
  state.formData[key] = val;
  // No re-render needed for text fields (avoid cursor loss)
  renderStickyFooter();
}

function setGuestDisc(key, val) {
  state.discounts.guests[key] = parseFloat(val) || 0;
  render();
}

function setDurDisc(key, val) {
  state.discounts.duration[key] = parseFloat(val) || 0;
  render();
}

function addMenuItem(category) {
  state.menu[category].push({ id: Date.now(), name: "Nowe danie", price: 0 });
  render();
}

function updateMenuName(category, idx, val) {
  state.menu[category][idx].name = val;
  const selIdx = state.selectedItems.findIndex(i => i.id === state.menu[category][idx].id);
  if (selIdx >= 0) state.selectedItems[selIdx].name = val;
}

function updateMenuPrice(category, idx, val) {
  state.menu[category][idx].price = parseFloat(val) || 0;
  const selIdx = state.selectedItems.findIndex(i => i.id === state.menu[category][idx].id);
  if (selIdx >= 0) state.selectedItems[selIdx].price = parseFloat(val) || 0;
  renderStickyFooter && renderStickyFooter();
}

function deleteMenuItem(category, idx) {
  const item = state.menu[category][idx];
  state.selectedItems = state.selectedItems.filter(i => i.id !== item.id);
  state.menu[category].splice(idx, 1);
  render();
}

function submitInquiry() {
  const d = state.formData;
  const items = state.selectedItems.map(i => i.name).join(', ') || '—';
  const total = getTotalPrice().toLocaleString('pl-PL');
  alert(
    `Zapytanie wysłane!\n\n` +
    `Klient: ${d.fullName || '—'}\n` +
    `E-mail: ${d.email || '—'}\n` +
    `Telefon: ${d.phone || '—'}\n` +
    `Termin: ${d.startDate} – ${d.endDate}\n` +
    `Gości: ${state.guestCount}\n` +
    `Wybrane dania: ${items}\n` +
    `Suma: ${total} zł`
  );
}

// ─── INIT ───
render();
</script>
</body>
</html>
