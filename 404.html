<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Strona Nie Istnieje | Rezydencja Parkova</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="robots" content="noindex, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green:    #2E5E2A;
            --gold:     #C8A028;
            --dark:     #080B07;
            --text:     #f0f0ea;
            --muted:    #8fa88d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        .bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 50% 50%, rgba(46,94,42,.08) 0%, transparent 70%);
            z-index: 0;
        }
        .container {
            text-align: center;
            max-width: 560px;
            position: relative;
            z-index: 1;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 48px;
            opacity: .6;
        }
        .logo span { color: var(--gold); }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            opacity: .15;
            margin-bottom: -20px;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-style: italic;
            color: var(--gold);
            margin-bottom: 16px;
        }
        p {
            color: var(--muted);
            margin-bottom: 36px;
            line-height: 1.7;
            font-size: .92rem;
        }
        .cta {
            background: var(--green);
            color: #fff;
            padding: 16px 38px;
            border-radius: 50px;
            font-weight: 700;
            font-size: .9rem;
            text-decoration: none;
            display: inline-block;
            transition: all .3s;
            box-shadow: 0 0 30px rgba(46,94,42,.45);
        }
        .cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(46,94,42,.55);
        }
        .phone {
            display: block;
            margin-top: 20px;
            color: var(--muted);
            text-decoration: none;
            font-size: .85rem;
        }
        .phone:hover { color: var(--gold); }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="logo">Rezydencja <span>Parkova</span></div>
        <h1>404</h1>
        <h2>Strona nie istnieje</h2>
        <p>Ta strona została przeniesiona lub nie istnieje.<br>Wróć na stronę główną lub zadzwoń do nas bezpośrednio.</p>
        <a href="index.html" class="cta">← Wróć na stronę główną</a>
        <a href="tel:+48886120501" class="phone">+48 886 120 501 · Recepcja całą dobę</a>
    </div>
</body>
</html>
